<!-- Extrait de /var/ossec/etc/ossec.conf pour intégration Honeypot -->
<ossec_config>
  <!-- ... autres configurations existantes ... -->

  <!-- === LOGS COWRIE === -->
  <localfile>
    <log_format>json</log_format>
    <location>/home/cowrie/cowrie/var/log/cowrie/cowrie.json</location>
  </localfile>

  <!-- === LOGS DIONAEA === -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/opt/dionaea/log/dionaea/dionaea.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/opt/dionaea/log/dionaea/dionaea-errors.log</location>
  </localfile>

  <!-- === COMMANDE SYSTÈME (optionnel) === -->
  <localfile>
    <log_format>command</log_format>
    <command>df -P</command>
    <frequency>360</frequency>
  </localfile>

</ossec_config>